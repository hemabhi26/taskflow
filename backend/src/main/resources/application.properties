# ─── App ────────────────────────────────────────
spring.application.name=taskflow

# ─── Database ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/taskflowdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ─────────────────────────────────────
server.port=8080

# ─── JWT (we'll use this later) ─────────────────
jwt.secret=taskflow-super-secret-key-must-be-at-least-256-bits-long-for-hmac
jwt.expiration=86400000