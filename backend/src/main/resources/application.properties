# ─── App ────────────────────────────────────────
spring.application.name=taskflow

# ─── Database ───────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/taskflowdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Server ─────────────────────────────────────
server.port=8080

# ─── JWT ────────────────────────────────────────
jwt.secret=${JWT_SECRET:taskflow-super-secret-key-must-be-at-least-256-bits-long-for-hmac}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Allow circular references ──────────────────
spring.main.allow-circular-references=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


# ─── Error Handling ─────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ─── Swagger ────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs